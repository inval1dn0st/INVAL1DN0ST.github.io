<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>larpingnost</title>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg-deepest:#1a1b23;
  --bg-rail:#1e1f28;
  --bg-side:#24252f;
  --bg-main:#2a2b36;
  --bg-elevated:#32333f;
  --bg-input:#3a3b48;
  --bg-hover:#33343f;
  --accent:#8b5cf6;
  --accent-hover:#7c4ded;
  --accent-soft:#8b5cf633;
  --text-bright:#f3f2f7;
  --text-normal:#d3d2db;
  --text-muted:#95949e;
  --text-faint:#6c6b76;
  --green:#3ba55d;
  --red:#ed4245;
  --yellow:#e6a23c;
  --danger:#ed4245;
  --radius:10px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font);
  background:var(--bg-deepest);
  color:var(--text-normal);
  overflow:hidden;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer; border:none; outline:none; background:none; color:inherit;}
input,textarea{font-family:inherit; outline:none; border:none; background:none; color:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#000000aa; border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}
img{-webkit-user-drag:none;}

#app{height:100vh; width:100vw; display:flex;}

/* ---------- SETUP SCREEN ---------- */
#setup-screen{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at 20% 20%, #33244f 0%, #1a1b23 55%);
}
.setup-card{
  width:400px; max-width:92vw; background:var(--bg-main); border-radius:16px; padding:32px 28px;
  box-shadow:0 20px 60px #00000066;
}
.setup-logo{
  display:flex; align-items:center; gap:10px; margin-bottom:6px;
}
.setup-logo .mark{
  width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,var(--accent),#5b2fc7);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; color:#fff;
}
.setup-logo .word{font-weight:800; font-size:20px; color:var(--text-bright); letter-spacing:.2px;}
.setup-card h1{font-size:21px; color:var(--text-bright); margin:18px 0 4px;}
.setup-card p.sub{color:var(--text-muted); font-size:13.5px; margin-bottom:20px; line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--text-muted); margin-bottom:7px;}
.field input{
  width:100%; padding:10px 12px; background:var(--bg-input); border-radius:6px; color:var(--text-bright); font-size:14.5px;
  border:1px solid transparent;
}
.field input:focus{border-color:var(--accent);}
.field .hint{font-size:11.5px; color:var(--text-faint); margin-top:5px;}
.field .err{font-size:12px; color:var(--red); margin-top:5px; display:none;}
.avatar-pick{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;}
.emoji-opt{
  width:38px; height:38px; border-radius:50%; background:var(--bg-input); display:flex; align-items:center; justify-content:center;
  font-size:19px; border:2px solid transparent;
}
.emoji-opt.sel{border-color:var(--accent);}
.btn{
  padding:11px 16px; border-radius:6px; font-weight:600; font-size:14px; text-align:center; display:inline-flex; align-items:center; justify-content:center; gap:6px;
  transition:background .12s;
}
.btn-primary{background:var(--accent); color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:disabled{opacity:.5; cursor:not-allowed;}
.btn-ghost{background:var(--bg-input); color:var(--text-normal);}
.btn-ghost:hover{background:var(--bg-hover);}
.btn-danger{background:var(--red); color:#fff;}
.btn-danger:hover{background:#c53537;}
.btn-block{width:100%;}

/* ---------- MAIN LAYOUT ---------- */
#main-ui{display:none; width:100%; height:100%;}
#main-ui.show{display:flex;}

.server-rail{
  width:72px; background:var(--bg-rail); display:flex; flex-direction:column; align-items:center;
  padding:12px 0; gap:8px; overflow-y:auto; flex-shrink:0;
}
.rail-item{
  width:48px; height:48px; border-radius:24px; background:var(--bg-elevated); color:var(--text-normal);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; position:relative;
  transition:border-radius .15s, background .15s; flex-shrink:0; overflow:hidden;
}
.rail-item img{width:100%;height:100%;object-fit:cover;}
.rail-item:hover, .rail-item.active{border-radius:16px; background:var(--accent); color:#fff;}
.rail-item.active::before{
  content:""; position:absolute; left:-12px; width:4px; height:24px; background:#fff; border-radius:0 4px 4px 0;
}
.rail-sep{width:32px; height:2px; background:var(--bg-elevated); border-radius:2px; margin:2px 0;}
.rail-add{background:var(--bg-elevated); color:var(--green); font-size:22px; font-weight:400;}
.rail-add:hover{background:var(--green); color:#fff;}

.sidebar{
  width:242px; background:var(--bg-side); display:flex; flex-direction:column; flex-shrink:0;
}
.sidebar-header{
  height:52px; display:flex; align-items:center; padding:0 16px; font-weight:700; color:var(--text-bright);
  box-shadow:0 1px 0 #00000044; flex-shrink:0; justify-content:space-between; font-size:15px;
}
.sidebar-scroll{flex:1; overflow-y:auto; padding:8px;}
.side-section-title{
  font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-faint); padding:14px 8px 4px; letter-spacing:.03em;
  display:flex; justify-content:space-between; align-items:center;
}
.side-section-title .add{font-size:16px; color:var(--text-faint);}
.side-section-title .add:hover{color:var(--text-bright);}
.side-item{
  display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; color:var(--text-muted); font-size:14.5px; margin-bottom:2px;
  position:relative;
}
.side-item:hover{background:var(--bg-hover); color:var(--text-normal); cursor:pointer;}
.side-item.active{background:var(--accent-soft); color:var(--text-bright);}
.side-item .ico{width:20px; text-align:center; color:inherit; flex-shrink:0;}
.side-item .name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.side-item .dot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
.side-item .badge{
  background:var(--red); color:#fff; font-size:10.5px; font-weight:700; border-radius:9px; padding:1px 6px; flex-shrink:0;
}
.avatar{
  width:32px; height:32px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0; position:relative; overflow:hidden;
}
.avatar img{width:100%;height:100%; object-fit:cover;}
.avatar.sm{width:22px;height:22px; font-size:12px;}
.avatar.lg{width:80px;height:80px; font-size:34px;}
.presence-dot{
  position:absolute; right:-2px; bottom:-2px; width:11px; height:11px; border-radius:50%; border:2.5px solid var(--bg-side);
  background:var(--text-faint);
}
.presence-dot.online{background:var(--green);}
.presence-dot.voice{background:var(--accent);}

.userbar{
  height:54px; background:var(--bg-elevated); display:flex; align-items:center; padding:0 8px; gap:6px; flex-shrink:0;
}
.userbar .who{display:flex; align-items:center; gap:8px; flex:1; overflow:hidden; padding:4px; border-radius:6px;}
.userbar .who:hover{background:var(--bg-hover); cursor:pointer;}
.userbar .who .txt{overflow:hidden;}
.userbar .who .n{font-size:13px; font-weight:600; color:var(--text-bright); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.userbar .who .s{font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.icon-btn{width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:16px; flex-shrink:0;}
.icon-btn:hover{background:var(--bg-hover); color:var(--text-bright);}
.icon-btn.on{color:var(--accent);}
.icon-btn.danger-on{color:var(--red);}

.main-panel{flex:1; display:flex; flex-direction:column; background:var(--bg-main); min-width:0;}
.main-header{
  height:52px; display:flex; align-items:center; padding:0 16px; box-shadow:0 1px 0 #00000044; flex-shrink:0; gap:8px;
}
.main-header .ico{color:var(--text-faint); font-size:20px;}
.main-header .title{font-weight:700; color:var(--text-bright); font-size:15.5px;}
.main-header .sub{color:var(--text-muted); font-size:13px; margin-left:8px; padding-left:8px; border-left:1px solid var(--text-faint);}
.main-header .spacer{flex:1;}

.messages{flex:1; overflow-y:auto; padding:16px 16px 6px;}
.msg-empty{
  padding:40px 20px; color:var(--text-muted); text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.msg-empty .big{font-size:40px;}
.msg-row{display:flex; gap:14px; padding:6px 8px; border-radius:6px; margin-bottom:2px;}
.msg-row:hover{background:#0000001a;}
.msg-row .avatar{margin-top:2px;}
.msg-body{flex:1; min-width:0;}
.msg-head{display:flex; align-items:baseline; gap:8px;}
.msg-head .author{font-weight:600; color:var(--text-bright); font-size:14.5px;}
.msg-head .time{font-size:11px; color:var(--text-faint);}
.msg-text{color:var(--text-normal); font-size:14.5px; line-height:1.45; word-break:break-word; white-space:pre-wrap;}
.msg-text img.emoji{width:22px; height:22px; vertical-align:middle; object-fit:contain;}
.msg-sys{text-align:center; color:var(--text-faint); font-size:12.5px; padding:10px; font-style:italic;}

.composer-wrap{padding:0 16px 16px; flex-shrink:0;}
.composer{
  background:var(--bg-input); border-radius:10px; display:flex; align-items:flex-end; padding:6px; gap:4px;
}
.composer textarea{
  flex:1; resize:none; padding:9px 8px; color:var(--text-bright); font-size:14.5px; max-height:140px; line-height:1.4;
}
.composer textarea::placeholder{color:var(--text-faint);}
.composer .icon-btn{margin-bottom:1px;}

/* friends / dm list view */
.friends-tabs{display:flex; align-items:center; gap:18px; padding:0 16px;}
.friends-tabs .tab{color:var(--text-muted); font-size:14px; font-weight:600; padding:6px 4px; position:relative;}
.friends-tabs .tab.active{color:var(--text-bright);}
.friends-tabs .tab.active::after{content:""; position:absolute; left:0; right:0; bottom:-14px; height:2px; background:var(--text-bright);}
.friends-body{flex:1; overflow-y:auto; padding:20px 16px;}
.friend-row{display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:8px; border-top:1px solid #ffffff10;}
.friend-row:hover{background:var(--bg-hover); cursor:pointer;}
.friend-row .info{flex:1;}
.friend-row .info .n{color:var(--text-bright); font-weight:600; font-size:14.5px;}
.friend-row .info .s{color:var(--text-muted); font-size:12.5px;}
.friend-row .actions{display:flex; gap:8px;}
.pill-btn{padding:6px 10px; border-radius:6px; background:var(--bg-elevated); font-size:12.5px; font-weight:600; color:var(--text-normal);}
.pill-btn:hover{background:var(--bg-hover);}
.pill-btn.accept{background:var(--green); color:#fff;}
.pill-btn.accept:hover{background:#2f8a4d;}
.pill-btn.decline:hover{background:var(--red); color:#fff;}

.addfriend-box{background:var(--bg-elevated); border-radius:10px; padding:16px; margin-bottom:20px;}
.addfriend-box h3{color:var(--text-bright); font-size:15px; margin-bottom:4px;}
.addfriend-box p{color:var(--text-muted); font-size:12.5px; margin-bottom:12px;}
.addfriend-row{display:flex; gap:8px;}
.addfriend-row input{flex:1; background:var(--bg-input); padding:9px 12px; border-radius:6px; color:var(--text-bright); font-size:14px;}

/* voice channel view */
.voice-view{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; padding:24px; overflow-y:auto;}
.voice-grid{display:flex; flex-wrap:wrap; gap:14px; justify-content:center; align-items:center; width:100%;}
.voice-tile{
  width:200px; height:140px; background:var(--bg-elevated); border-radius:12px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative; overflow:hidden; gap:8px;
}
.voice-tile.speaking{outline:2.5px solid var(--green);}
.voice-tile video{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
.voice-tile .name-tag{position:absolute; left:8px; bottom:8px; background:#000000aa; padding:2px 8px; border-radius:5px; font-size:12px; color:#fff; display:flex; align-items:center; gap:5px;}
.voice-controls{display:flex; gap:12px;}
.voice-controls .vc-btn{
  width:52px; height:52px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:19px; color:var(--text-normal);
}
.voice-controls .vc-btn:hover{background:var(--bg-hover);}
.voice-controls .vc-btn.on{background:var(--accent); color:#fff;}
.voice-controls .vc-btn.leave{background:var(--red); color:#fff;}
.voice-controls .vc-btn.leave:hover{background:#c53537;}
.voice-hint{color:var(--text-muted); font-size:13px; text-align:center; max-width:320px;}

/* modal */
.modal-overlay{
  position:fixed; inset:0; background:#000000b3; display:flex; align-items:center; justify-content:center; z-index:100;
}
.modal{
  background:var(--bg-main); border-radius:14px; width:440px; max-width:92vw; max-height:86vh; overflow-y:auto; box-shadow:0 20px 60px #00000066;
}
.modal-head{padding:20px 22px 6px; display:flex; justify-content:space-between; align-items:center;}
.modal-head h2{font-size:19px; color:var(--text-bright);}
.modal-head .close{font-size:20px; color:var(--text-faint);}
.modal-head .close:hover{color:var(--text-bright);}
.modal-body{padding:6px 22px 22px;}
.modal-body p.desc{color:var(--text-muted); font-size:13px; margin-bottom:16px; line-height:1.5;}
.modal-foot{padding:14px 22px 22px; display:flex; justify-content:flex-end; gap:8px;}
.invite-box{background:var(--bg-input); border-radius:8px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-top:8px;}
.invite-box code{flex:1; color:var(--accent); font-weight:700; letter-spacing:1px; font-size:15px;}
.toggle-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0;}
.emoji-shelf{display:flex; flex-wrap:wrap; gap:8px; max-height:150px; overflow-y:auto; padding:10px; background:var(--bg-input); border-radius:8px;}
.emoji-shelf .em{width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:18px;}
.emoji-shelf .em:hover{background:var(--bg-hover);}
.emoji-shelf .em img{width:22px; height:22px; object-fit:contain;}
.custom-emoji-row{display:flex; align-items:center; gap:10px; padding:6px 4px;}
.custom-emoji-row img{width:24px;height:24px; object-fit:contain;}
.custom-emoji-row .cn{flex:1; font-size:13px; color:var(--text-normal);}

.toast-wrap{position:fixed; right:18px; bottom:18px; display:flex; flex-direction:column; gap:8px; z-index:200;}
.toast{background:var(--bg-elevated); color:var(--text-bright); padding:11px 16px; border-radius:8px; font-size:13.5px; box-shadow:0 8px 24px #00000066; border-left:3px solid var(--accent); max-width:320px;}
.toast.err{border-left-color:var(--red);}
.toast.ok{border-left-color:var(--green);}

.tooltip-label{font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:var(--text-faint); font-weight:700; margin:2px 0 6px;}

@media (max-width: 760px){
  .sidebar{position:absolute; left:72px; top:0; bottom:0; z-index:20; transform:translateX(0); box-shadow:6px 0 20px #00000066;}
}
</style>
</head>
<body>

<div id="app">

  <div id="setup-screen">
    <div class="setup-card">
      <div class="setup-logo">
        <div class="mark">L</div>
        <div class="word">larpingnost</div>
      </div>
      <h1>Создать профиль</h1>
      <p class="sub">Свой мессенджер для своих. Имя ниже — уникальный логин, по которому друзья смогут тебя найти и добавить.</p>

      <div class="field">
        <label>Логин (уникальный)</label>
        <input id="su-username" maxlength="20" placeholder="например vanya_gm">
        <div class="err" id="su-username-err">Этот логин уже занят</div>
      </div>
      <div class="field">
        <label>Отображаемое имя</label>
        <input id="su-nick" maxlength="26" placeholder="Как тебя видят друзья">
      </div>
      <div class="field">
        <label>Аватар</label>
        <div class="avatar-pick" id="su-avatars"></div>
        <div class="hint">Позже можно загрузить своё изображение в настройках.</div>
      </div>
      <button class="btn btn-primary btn-block" id="su-submit">Войти в larpingnost</button>
    </div>
  </div>

  <div id="main-ui">
    <div class="server-rail" id="server-rail"></div>
    <div class="sidebar" id="sidebar"></div>
    <div class="main-panel" id="main-panel"></div>
  </div>

</div>

<div id="modal-root"></div>
<div class="toast-wrap" id="toast-wrap"></div>

<script>
(function(){
"use strict";

/* ================= UTIL ================= */
const $ = sel => document.querySelector(sel);
const $$ = (sel, root) => Array.from((root||document).querySelectorAll(sel));
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(36).slice(2));
const now = () => Date.now();
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function code6(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
function timeStr(ts){
  const d = new Date(ts);
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  return h+':'+m;
}
function toast(msg, type){
  const wrap = $('#toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type?(' '+type):'');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3800);
}
const EMOJI_SET = ['😀','😂','😎','😍','🤔','😢','😡','🎉','🔥','👍','👎','❤️','💀','👀','🙌','🤝','🥳','😴','🤯','🫡','✨','💯','🎮','🍕'];

/* ================= FIREBASE BACKEND =================
   Чтобы мессенджер реально работал между разными людьми/устройствами,
   сюда нужно вставить конфиг своего бесплатного проекта Firebase:
   1. Зайди на https://console.firebase.google.com → Add project (бесплатно).
   2. В проекте: Build → Realtime Database → Create Database → режим "Test mode"
      (это делает базу открытой на чтение/запись без логина — подходит для
      приватного мессенджера среди друзей, но помни: технически любой, кто
      узнает эти ключи, сможет читать/писать в базу).
   3. Project settings (шестерёнка) → General → в блоке "Your apps" нажми
      значок "</>" (Web app), зарегистрируй приложение — тебе покажут
      объект firebaseConfig. Скопируй его сюда вместо значений ниже.
============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCEK9eRTSLCfdlE6GzsRY6FIyXRcEkOKhA",
  authDomain: "larpingcord-b98a4.firebaseapp.com",
  databaseURL: "https://larpingcord-b98a4-default-rtdb.firebaseio.com",
  projectId: "larpingcord-b98a4",
  storageBucket: "larpingcord-b98a4.firebasestorage.app",
  messagingSenderId: "485812879605",
  appId: "1:485812879605:web:7e055fdfc9a194599205bc",
  measurementId: "G-5Y5P47DWR0"
};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey && firebaseConfig.apiKey !== "ВСТАВЬ_СЮДА" && !!firebaseConfig.databaseURL;
let db = null;
if (FIREBASE_CONFIGURED){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  }catch(e){ console.error('firebase init failed', e); }
}

async function sget(key){
  if (!db) return null;
  try{
    const snap = await db.ref(key).once('value');
    const v = snap.val();
    return v ? JSON.parse(v) : null;
  }catch(e){ console.error('db get failed', key, e); return null; }
}
async function sset(key, value){
  if (!db) return null;
  try{ await db.ref(key).set(JSON.stringify(value)); return true; }
  catch(e){ console.error('db set failed', key, e); return null; }
}

/* Личность привязана к браузеру/устройству (localStorage), а не к Firebase —

function resizeImageFile(file, maxDim){

  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h){ if (w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; } }
        else { if (h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================= FRIENDS / REQUESTS ================= */
async function refreshFriendsAndRequests(silent){
  const myFriends = await sget('friends:'+State.me.id, true) || [];
  const myReq = await sget('requests:'+State.me.id, true) || [];
  const friendProfiles = [];
  for (const fid of myFriends){ const p = await getProfile(fid); if (p) friendProfiles.push(p); }
  const reqProfiles = [];
  for (const r of myReq){ const p = await getProfile(r.from); if (p) reqProfiles.push(p); }
  State.friends = friendProfiles;
  State.requests = reqProfiles;
}

async function sendFriendRequest(username){
  username = (username||'').trim();
  if (!username) return;
  const targetId = await sget('username:'+username.toLowerCase(), true);
  if (!targetId){ toast('Пользователь «'+username+'» не найден. Он должен хотя бы раз открыть larpingnost.', 'err'); return; }
  if (targetId === State.me.id){ toast('Это твой собственный логин 🙂', 'err'); return; }
  const myFriends = await sget('friends:'+State.me.id, true) || [];
  if (myFriends.includes(targetId)){ toast('Вы уже друзья', 'err'); return; }
  const theirReq = await sget('requests:'+targetId, true) || [];
  if (theirReq.some(r=>r.from===State.me.id)){ toast('Заявка уже отправлена', 'ok'); return; }
  theirReq.push({from: State.me.id, at: now()});
  await sset('requests:'+targetId, theirReq, true);
  toast('Заявка в друзья отправлена', 'ok');
}

async function acceptRequest(fromId){
  const myReq = await sget('requests:'+State.me.id, true) || [];
  await sset('requests:'+State.me.id, myReq.filter(r=>r.from!==fromId), true);
  const myFriends = await sget('friends:'+State.me.id, true) || [];
  if (!myFriends.includes(fromId)){ myFriends.push(fromId); await sset('friends:'+State.me.id, myFriends, true); }
  const theirFriends = await sget('friends:'+fromId, true) || [];
  if (!theirFriends.includes(State.me.id)){ theirFriends.push(State.me.id); await sset('friends:'+fromId, theirFriends, true); }
  await refreshFriendsAndRequests();
  renderSidebar(); renderMain();
  toast('Теперь вы друзья', 'ok');
}
async function declineRequest(fromId){
  const myReq = await sget('requests:'+State.me.id, true) || [];
  await sset('requests:'+State.me.id, myReq.filter(r=>r.from!==fromId), true);
  await refreshFriendsAndRequests();
  renderSidebar(); renderMain();
}

async function refreshMyServers(){

async function createServer(name){
  name = (name||'').trim() || 'Мой сервер';
  const id = uid();
  const server = {
    id, name, icon: name.trim().slice(0,2).toUpperCase(),
    ownerId: State.me.id,
    invite: code6(),
    channels: [ {id:uid(), name:'общий', type:'text'}, {id:uid(), name:'Голосовой', type:'voice'} ],
    members: [State.me.id],
    customEmojis: [],
    createdAt: now()
  };
  await sset('server:'+id, server, true);
  await sset('invite:'+server.invite, id, true);
  const idx = await sget('serverIndex:'+State.me.id, true) || [];
  idx.push(id);
  await sset('serverIndex:'+State.me.id, idx, true);
  await refreshMyServers();
  renderRail();
  setView({type:'server', serverId:id, channelId:server.channels[0].id});
  toast('Сервер «'+name+'» создан', 'ok');
}
async function joinServerByInvite(codeRaw){
  const code = (codeRaw||'').trim().toUpperCase();
  if (!code) return;
  const sid = await sget('invite:'+code, true);
  if (!sid){ toast('Неверный код приглашения', 'err'); return; }
  const server = await sget('server:'+sid, true);
  if (!server){ toast('Сервер не найден', 'err'); return; }
  if (!server.members.includes(State.me.id)){
    server.members.push(State.me.id);
    await sset('server:'+sid, server, true);
    const idx = await sget('serverIndex:'+State.me.id, true) || [];
    if (!idx.includes(sid)){ idx.push(sid); await sset('serverIndex:'+State.me.id, idx, true); }
  }
  await refreshMyServers();
  renderRail();
  setView({type:'server', serverId: sid, channelId: server.channels[0] ? server.channels[0].id : null});
  toast('Вы присоединились к серверу «'+server.name+'»', 'ok');
}
async function createChannel(serverId, name, type){
  const server = await sget('server:'+serverId, true);
  if (!server) return;
  const ch = {id: uid(), name: (name||'канал').trim().toLowerCase().replace(/\s+/g,'-'), type};
  server.channels.push(ch);
  await sset('server:'+serverId, server, true);
  await refreshMyServers();
  renderSidebar();
  toast('Канал создан', 'ok');
}
function currentServer(){
  if (State.view.type !== 'server') return null;
  return State.servers.find(s=>s.id===State.view.serverId) || null;
}

function pairKey(a,b){ return [a,b].sort().join('_'); }
function msgKeyForView(){
  if (State.view.type === 'dm') return 'dm:' + pairKey(State.me.id, State.view.peerId);
  if (State.view.type === 'server') return 'msgs:' + State.view.serverId + ':' + State.view.channelId;
  return null;
}
let lastRenderedCount = -1;
let msgListenerRef = null;
function detachMessageListener(){
  if (msgListenerRef){ try{ msgListenerRef.off('value'); }catch(e){} msgListenerRef = null; }
}
function attachMessageListener(){
  detachMessageListener();
  const key = msgKeyForView();
  if (!key || !db) return;
  msgListenerRef = db.ref(key);
  msgListenerRef.on('value', snap => {
    const raw = snap.val();
    const list = raw ? JSON.parse(raw) : [];
    lastRenderedCount = list.length;
    renderMessages(list);
  });
}
async function refreshMessages(silentIfSame){
  const key = msgKeyForView();
  if (!key) return;
  const list = await sget(key) || [];
  if (silentIfSame && list.length === lastRenderedCount) return;
  lastRenderedCount = list.length;
  renderMessages(list);
}
async function sendMessage(text){
  text = (text||'').trim();
  if (!text) return;
  const key = msgKeyForView();
  if (!key) return;
  const list = await sget(key) || [];
  list.push({from: State.me.id, text, at: now()});
  const trimmed = list.slice(-250);
  await sset(key, trimmed);
}

function renderEmojiInText(text, customEmojis){
  let out = esc(text);
  if (customEmojis && customEmojis.length){
    for (const em of customEmojis){
      const re = new RegExp(':'+em.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+':', 'g');
      out = out.replace(re, `<img class="emoji" src="${em.url}" alt=":${esc(em.name)}:">`);
    }
  }
  return out;
}

async function renderMessages(list){
  const box = $('#messages-box');
  if (!box) return;
  if (!list.length){
    box.innerHTML = `<div class="msg-empty"><div class="big">👋</div><div>Пока нет сообщений. Начните разговор!</div></div>`;
    return;
  }
  const server = currentServer();
  const customEmojis = server ? server.customEmojis : [];
  const atBottom = (box.scrollTop + box.clientHeight) >= (box.scrollHeight - 60);
  let html = '';
  let lastAuthor = null, lastTime = 0;
  for (const m of list){
    const prof = await getProfile(m.from) || {nickname:'???', avatar:{type:'emoji',value:'❓'}};
    const grouped = (lastAuthor === m.from) && (m.at - lastTime < 5*60*1000);
    if (grouped){
      html += `<div class="msg-row" style="padding-left:8px;">
        <div style="width:32px;flex-shrink:0;text-align:right;"></div>
        <div class="msg-body"><div class="msg-text">${renderEmojiInText(m.text, customEmojis)}</div></div>
      </div>`;
    } else {
      html += `<div class="msg-row">
        ${avatarHTML(prof.avatar)}
        <div class="msg-body">
          <div class="msg-head"><span class="author">${esc(prof.nickname)}</span><span class="time">${timeStr(m.at)}</span></div>
          <div class="msg-text">${renderEmojiInText(m.text, customEmojis)}</div>
        </div>
      </div>`;
    }
    lastAuthor = m.from; lastTime = m.at;
  }
  box.innerHTML = html;
  if (atBottom) box.scrollTop = box.scrollHeight;
}

async function voicePresenceGetAll(channelKey){
  if (!db) return {};
  try{ const snap = await db.ref('voicePresence/'+channelKey).once('value'); return snap.val() || {}; }
  catch(e){ console.error('voice presence read failed', e); return {}; }
}

async function joinVoice(channelKey, autoView){
  if (State.voice && State.voice.channelKey === channelKey) return;
  if (State.voice) await leaveVoice();
  let localStream;
  try{
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    toast('Не удалось получить доступ к микрофону: ' + e.message, 'err');
    return;
  }
  State.voice = {
    channelKey, localStream, screenStream:null, muted:false, sharing:false,
    peers: {}, autoView,
    presenceTimer:null, signalTimer:null
  };
  const myPresenceRef = db.ref('voicePresence/'+channelKey+'/'+State.me.id);
  await myPresenceRef.set({at: now(), muted:false, sharing:false, nickname: State.me.nickname});
  myPresenceRef.onDisconnect().remove(); // авточистка, если вкладка закроется/сеть оборвётся

  const presence = await voicePresenceGetAll(channelKey);
  Object.keys(presence).forEach(pid=>{
    if (pid !== State.me.id && (now() - presence[pid].at) < 20000){
      connectToPeer(pid, State.me.id < pid);
    }
  });

  State.voice.presenceTimer = setInterval(async ()=>{
    if (!State.voice) return;
    await myPresenceRef.update({at: now(), muted: State.voice.muted, sharing: State.voice.sharing});
  }, 5000);
  State.voice.signalTimer = setInterval(pollSignals, 1000);
  refreshVoiceParticipants();
  renderMain();
}

async function refreshVoiceParticipants(){
  if (!State.voice) return;
  const pres = await voicePresenceGetAll(State.voice.channelKey);
  const activeIds = Object.keys(pres).filter(id => (now()-pres[id].at) < 20000);
  for (const pid of activeIds){
    if (pid !== State.me.id && !State.voice.peers[pid]){
      connectToPeer(pid, State.me.id < pid);
    }
  }
  for (const pid of Object.keys(State.voice.peers)){
    if (!activeIds.includes(pid)){
      closePeer(pid);
    }
  }
  renderVoiceGrid(pres);
}

function connectToPeer(peerId, initiator){
  if (!State.voice || State.voice.peers[peerId]) return;
  const pc = new RTCPeerConnection({iceServers: ICE_SERVERS});
  const entry = {pc, streams:{}, negotiating:false};
  State.voice.peers[peerId] = entry;
  State.voice.localStream.getTracks().forEach(t => pc.addTrack(t, State.voice.localStream));
  if (State.voice.screenStream){
    State.voice.screenStream.getTracks().forEach(t => pc.addTrack(t, State.voice.screenStream));
  }
  pc.onicecandidate = e => { if (e.candidate) sendSignal(peerId, {type:'candidate', data:e.candidate}); };
  pc.ontrack = e => {
    entry.streams[e.track.kind + (e.track.label||'')] = e.streams[0];
    entry.remoteStream = e.streams[0];
    entry.hasVideo = e.track.kind === 'video' || entry.hasVideo;
    renderVoiceGrid();
  };
  pc.onconnectionstatechange = ()=>{
    if (['failed','disconnected','closed'].includes(pc.connectionState)){
      // leave cleanup handled by presence loop
    }
  };
  pc.onnegotiationneeded = async ()=>{
    if (entry.negotiating) return;
    entry.negotiating = true;
    try{
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendSignal(peerId, {type:'offer', data:{type:offer.type, sdp:offer.sdp}});
    }catch(err){ console.error(err); }
    finally{ entry.negotiating = false; }
  };
}
function closePeer(peerId){
  if (!State.voice) return;
  const entry = State.voice.peers[peerId];
  if (entry){ try{ entry.pc.close(); }catch(e){} delete State.voice.peers[peerId]; }
}

async function sendSignal(toId, msg){
  if (!db) return;
  msg.from = State.me.id;
  try{ await db.ref('signals/'+State.voice.channelKey+'/'+toId).push(msg); }
  catch(e){ console.error('sendSignal failed', e); }
}
async function pollSignals(){
  if (!State.voice || !db) return;
  const ref = db.ref('signals/'+State.voice.channelKey+'/'+State.me.id);
  let snap;
  try{ snap = await ref.once('value'); }catch(e){ return; }
  const val = snap.val();
  if (!val) return;
  const entries = Object.entries(val); // [[pushKey, msg], ...]
  for (const [pushKey, m] of entries){
    ref.child(pushKey).remove(); // потребили сообщение — убираем именно его, без гонок с новыми
    try{
      if (m.type === 'offer'){
        if (!State.voice.peers[m.from]) connectToPeer(m.from, false);
        const entry = State.voice.peers[m.from];
        await entry.pc.setRemoteDescription(new RTCSessionDescription(m.data));
        const answer = await entry.pc.createAnswer();
        await entry.pc.setLocalDescription(answer);
        sendSignal(m.from, {type:'answer', data:{type:answer.type, sdp:answer.sdp}});
      } else if (m.type === 'answer'){
        const entry = State.voice.peers[m.from];
        if (entry) await entry.pc.setRemoteDescription(new RTCSessionDescription(m.data));
      } else if (m.type === 'candidate'){
        const entry = State.voice.peers[m.from];
        if (entry){ try{ await entry.pc.addIceCandidate(new RTCIceCandidate(m.data)); }catch(e){} }
      }
    }catch(err){ console.error('signal handling error', err); }
  }
}

function renderVoiceGrid(pres){
  const grid = document.getElementById('voice-grid');
  if (!grid || !State.voice) return;
  let html = '';
  html += voiceTileHTML(State.me, true, State.voice.muted, null, State.voice.screenStream);
  for (const pid of Object.keys(State.voice.peers)){
    const entry = State.voice.peers[pid];
    const prof = State.peerCache[pid] || {nickname:'…', avatar:{type:'emoji',value:'🙂'}};
    html += voiceTileHTML(prof, false, false, entry.remoteStream, null);
  }
  grid.innerHTML = html;
  // attach media streams to newly created media elements
  document.querySelectorAll('#voice-grid video[data-stream="local-screen"]').forEach(v=>{ if (State.voice.screenStream) v.srcObject = State.voice.screenStream; });
  Object.keys(State.voice.peers).forEach(pid=>{
    const entry = State.voice.peers[pid];
    const v = document.querySelector('#voice-grid video[data-peer="'+pid+'"]');
    const a = document.querySelector('#voice-grid audio[data-peer="'+pid+'"]');
    if (entry.remoteStream){
      if (v) v.srcObject = entry.remoteStream;
      if (a) a.srcObject = entry.remoteStream;
    }
  });
  Object.keys(State.peerCache).length; // noop
  Object.keys(State.voice.peers).forEach(pid=>{ if (!State.peerCache[pid]) getProfile(pid).then(()=>renderVoiceGrid()); });
}
function voiceTileHTML(prof, isMe, muted, remoteStream, localScreenStream){
  const av = avatarHTML(prof.avatar, 'lg');
  const hasVideo = remoteStream && remoteStream.getVideoTracks && remoteStream.getVideoTracks().length;
  let media = '';
  if (isMe && localScreenStream){
    media = `<video data-stream="local-screen" autoplay muted playsinline></video>`;
  } else if (!isMe && hasVideo){
    media = `<video data-peer="__PID__" autoplay playsinline></video><audio data-peer="__PID__" autoplay></audio>`;
  } else if (!isMe && remoteStream){
    media = `<audio data-peer="__PID__" autoplay></audio>`;
  }
  return `<div class="voice-tile">
    ${media || av}
    <div class="name-tag">${muted?'🔇':'🎤'} ${esc(prof.nickname)}${isMe?' (вы)':''}</div>
  </div>`.replace(/__PID__/g, prof.id||'');
}

async function toggleMic(){
  if (!State.voice) return;
  State.voice.muted = !State.voice.muted;
  State.voice.localStream.getAudioTracks().forEach(t => t.enabled = !State.voice.muted);
  renderMain(); renderVoiceGrid();
  const overlay = document.getElementById('call-overlay');
  if (overlay){ const b = overlay.querySelector('#vc-mic'); if(b){ b.textContent = State.voice.muted?'🔇':'🎤'; b.classList.toggle('on', !State.voice.muted); } }
}
async function toggleScreenShare(){
  if (!State.voice) return;
  if (!State.voice.sharing){
    let stream;
    try{ stream = await navigator.mediaDevices.getDisplayMedia({video:true}); }
    catch(e){ toast('Демонстрация экрана отменена или недоступна', 'err'); return; }
    State.voice.screenStream = stream;
    State.voice.sharing = true;
    Object.values(State.voice.peers).forEach(entry=>{
      stream.getTracks().forEach(t => entry.pc.addTrack(t, stream));
    });
    stream.getVideoTracks()[0].addEventListener('ended', ()=> stopScreenShare());
  } else {
    stopScreenShare();
  }
  renderMain(); renderVoiceGrid();
}
function stopScreenShare(){
  if (!State.voice || !State.voice.screenStream) return;
  const tracks = State.voice.screenStream.getTracks();
  Object.values(State.voice.peers).forEach(entry=>{
    entry.pc.getSenders().forEach(s=>{
      if (s.track && tracks.includes(s.track)) entry.pc.removeTrack(s);
    });
  });
  tracks.forEach(t=>t.stop());
  State.voice.screenStream = null;
  State.voice.sharing = false;
  renderMain(); renderVoiceGrid();
}
async function leaveVoice(){
  if (!State.voice) return;
  const v = State.voice;
  clearInterval(v.presenceTimer);
  clearInterval(v.signalTimer);
  Object.keys(v.peers).forEach(closePeer);
  v.localStream.getTracks().forEach(t=>t.stop());
  if (v.screenStream) v.screenStream.getTracks().forEach(t=>t.stop());
  if (db){ try{ await db.ref('voicePresence/'+v.channelKey+'/'+State.me.id).remove(); }catch(e){} }
  State.voice = null;
  const overlay = document.getElementById('call-overlay');
  if (overlay) overlay.remove();
  renderMain();
}

    </div>`);
  $('#copy-invite').addEventListener('click', ()=>{ navigator.clipboard.writeText(server.invite).then(()=>toast('Код скопирован','ok')); });
  $('#copy-invite-link').addEventListener('click', ()=>{ navigator.clipboard.writeText(location.origin+location.pathname+'?server='+server.invite).then(()=>toast('Ссылка скопирована','ok')); });
}
function openCreateChannelModal(serverId, type){
  openModal(`
    <div class="modal" style="width:400px;">
      <div class="modal-head"><h2>Создать ${type==='voice'?'голосовой':'текстовый'} канал</h2><span class="close" onclick="App.closeModal()">✕</span></div>
      <div class="modal-body">
        <div class="field"><label>Название канала</label><input id="cc-name" placeholder="${type==='voice'?'общение':'болталка'}"></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="App.closeModal()">Отмена</button><button class="btn btn-primary" id="cc-submit">Создать</button></div>
    </div>`);
  $('#cc-submit').addEventListener('click', async ()=>{ const n=$('#cc-name').value; closeModal(); await createChannel(serverId, n, type); });
}
function openSettingsModal(){
  const me = State.me;
  openModal(`
    <div class="modal" style="width:440px;">
      <div class="modal-head"><h2>Настройки профиля</h2><span class="close" onclick="App.closeModal()">✕</span></div>
      <div class="modal-body">
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:18px;">
          ${avatarHTML(me.avatar,'lg')}
          <div>
            <label class="pill-btn" style="cursor:pointer;">Загрузить фото<input type="file" id="av-upload" accept="image/*" style="display:none;"></label>
          </div>
        </div>
        <div class="tooltip-label">Или выбрать эмодзи-аватар</div>
        <div class="avatar-pick" id="set-avatars" style="margin-bottom:16px;">
          ${EMOJI_SET.map(e=>`<button class="emoji-opt${(me.avatar.type==='emoji'&&me.avatar.value===e)?' sel':''}" data-e="${e}">${e}</button>`).join('')}
        </div>
        <div class="field"><label>Отображаемое имя</label><input id="set-nick" value="${esc(me.nickname)}" maxlength="26"></div>
        <div class="field"><label>Статус (необязательно)</label><input id="set-status" value="${esc(me.status||'')}" maxlength="60" placeholder="Например: играю в что-то"></div>
        <div class="field"><label>Твой логин (нельзя изменить)</label><input value="@${esc(me.username)}" disabled style="opacity:.6;"></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="App.closeModal()">Отмена</button><button class="btn btn-primary" id="set-save">Сохранить</button></div>
    </div>`);
  let newAvatar = me.avatar;
  $('#set-avatars').addEventListener('click', e=>{
    const b = e.target.closest('.emoji-opt'); if(!b) return;
    newAvatar = {type:'emoji', value:b.dataset.e};
    $$('.emoji-opt', $('#set-avatars')).forEach(x=>x.classList.toggle('sel', x===b));
  });
  $('#av-upload').addEventListener('change', async e=>{
    const file = e.target.files[0]; if (!file) return;
    try{
      const dataUrl = await resizeImageFile(file, 160);
      newAvatar = {type:'image', value: dataUrl};
      toast('Фото загружено, нажмите «Сохранить»', 'ok');
    }catch(err){ toast('Не удалось загрузить изображение', 'err'); }
  });
  $('#set-save').addEventListener('click', async ()=>{
    me.nickname = $('#set-nick').value.trim() || me.username;
    me.status = $('#set-status').value.trim();
    me.avatar = newAvatar;
    await sset('user:'+me.id, me, true);
    State.peerCache[me.id] = me;
    closeModal();
    renderSidebar(); renderMain(); renderRail();
    toast('Профиль обновлён', 'ok');
  });
}
function openEmojiManageModal(serverId){
  const server = State.servers.find(s=>s.id===serverId);
  if (!server) return;
  openModal(`
    <div class="modal" style="width:440px;">
      <div class="modal-head"><h2>Эмодзи сервера</h2><span class="close" onclick="App.closeModal()">✕</span></div>
      <div class="modal-body">
        <p class="desc">Загрузи картинку — она станет кастомным эмодзи, доступным в чатах этого сервера как :название:.</p>
        <div class="addfriend-row" style="margin-bottom:14px;">
          <input id="em-name" placeholder="название (без пробелов)" maxlength="20">
          <label class="pill-btn" style="cursor:pointer;">Файл<input type="file" id="em-file" accept="image/*" style="display:none;"></label>
        </div>
        <div id="em-list"></div>
      </div>
      <div class="modal-foot"><button class="btn btn-ghost" onclick="App.closeModal()">Готово</button></div>
    </div>`);
  function renderList(){
    $('#em-list').innerHTML = (server.customEmojis||[]).map((c,i)=>`
      <div class="custom-emoji-row"><img src="${c.url}"><span class="cn">:${esc(c.name)}:</span><span class="pill-btn" data-del="${i}">Удалить</span></div>
    `).join('') || '<div style="color:var(--text-faint); font-size:12.5px;">Пока нет кастомных эмодзи.</div>';
    $('#em-list').querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        server.customEmojis.splice(Number(b.dataset.del),1);
        await sset('server:'+server.id, server, true);
        renderList();
      });
    });
  }
  renderList();
  $('#em-file').addEventListener('change', async e=>{
    const file = e.target.files[0]; if (!file) return;
    const nameInput = $('#em-name');
    let name = nameInput.value.trim().replace(/[^a-zA-Z0-9_а-яА-Я]/g,'');
    if (!name){ toast('Введите название эмодзи', 'err'); return; }
    try{
      const dataUrl = await resizeImageFile(file, 64);
      server.customEmojis = server.customEmojis || [];
      server.customEmojis.push({name, url:dataUrl});
      await sset('server:'+server.id, server, true);
      nameInput.value=''; e.target.value='';
      renderList();
      toast('Эмодзи добавлен', 'ok');
    }catch(err){ toast('Не удалось загрузить изображение', 'err'); }
  });
}

/* ================= PUBLIC API for inline handlers ================= */
window.App = {
  goHome: ()=> setView({type:'friends', tab:'online'}),
  openServer: (id)=>{ const s = State.servers.find(x=>x.id===id); if(!s) return; setView({type:'server', serverId:id, channelId: s.channels[0]?s.channels[0].id:null}); },
  openAddServerModal, openJoinServerModal, openServerInviteModal, openCreateChannelModal,
  openSettingsModal, openEmojiManageModal, closeModal,
  toggleMic, toggleScreenShare, leaveVoice, startDMCall
};

boot();
})();
</script>
